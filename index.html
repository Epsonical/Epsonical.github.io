<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Epsonical Launchpad</title>

<style>

body{
margin:0;
min-height:100vh;
font-family:system-ui,Arial;
color:white;
background:linear-gradient(270deg,#0b2a66,#071a3a,#000000,#071a3a);
background-size:600% 600%;
animation:gradientMove 16s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.wrap{
max-width:1000px;
margin:auto;
padding:30px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:26px;
font-weight:700;
}

#clock{
opacity:.8;
}

/* SEARCH */

.search{
display:flex;
justify-content:center;
margin-bottom:30px;
}

.search form{
display:flex;
gap:10px;
padding:12px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 35px rgba(0,140,255,0.25);
}

.search input{
width:400px;
height:45px;
border:none;
border-radius:12px;
padding:10px;
font-size:16px;
background:rgba(0,0,0,0.4);
color:white;
}

.search button{
height:45px;
padding:0 18px;
border:none;
border-radius:12px;
background:#2c5cff;
color:white;
cursor:pointer;
}

.search button:hover{
background:#3e6cff;
}

/* APP GRID */

.tiles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
}

.tile{
display:flex;
align-items:center;
gap:12px;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(8px);
box-shadow:0 0 30px rgba(0,140,255,0.25);
cursor:pointer;
transition:.15s;
}

.tile:hover{
transform:translateY(-3px);
box-shadow:0 0 40px rgba(0,180,255,0.45);
}

.logo{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.4);
border-radius:10px;
}

.logo img{
width:22px;
}

.meta{
text-align:left;
}

.name{
font-weight:600;
}

.hint{
font-size:12px;
opacity:.7;
margin-top:4px;
}

.note{
margin-top:25px;
text-align:center;
opacity:.7;
font-size:13px;
}

</style>
</head>

<body>

<div class="wrap">

<header>
<div class="title">Epsonical Launchpad</div>
<div id="clock"></div>
</header>

<div class="search">
<form action="https://www.google.com/search" method="GET" target="_blank">
<input name="q" placeholder="Search Google...">
<button type="submit">Search</button>
</form>
</div>

<div class="tiles">

<div class="tile" onclick="openApp('discord://','https://discord.com/app')">
<div class="logo">
<img src="https://cdn.simpleicons.org/discord/ffffff">
</div>
<div class="meta">
<div class="name">Discord</div>
<div class="hint">Open app (fallback web)</div>
</div>
</div>

<div class="tile" onclick="openApp('whatsapp://','https://web.whatsapp.com')">
<div class="logo">
<img src="https://cdn.simpleicons.org/whatsapp/ffffff">
</div>
<div class="meta">
<div class="name">WhatsApp</div>
<div class="hint">Open app (fallback web)</div>
</div>
</div>

<div class="tile" onclick="openApp('spotify:','https://open.spotify.com')">
<div class="logo">
<img src="https://cdn.simpleicons.org/spotify/ffffff">
</div>
<div class="meta">
<div class="name">Spotify</div>
<div class="hint">Open app (fallback web)</div>
</div>
</div>

<div class="tile" onclick="openApp('roblox://','https://www.roblox.com')">
<div class="logo">
<img src="https://cdn.simpleicons.org/roblox/ffffff">
</div>
<div class="meta">
<div class="name">Roblox</div>
<div class="hint">Open app (fallback web)</div>
</div>
</div>

</div>

<div class="note">
Deep links depend on device/browser. If the app isn't installed the web version opens.
</div>

</div>

<script>

function openApp(app,web){

window.location=app;

setTimeout(()=>{
window.open(web,"_blank");
},700);

}

/* IST CLOCK */

const clock=document.getElementById("clock");

setInterval(()=>{

clock.innerText=new Date().toLocaleString("en-IN",{
timeZone:"Asia/Kolkata",
hour:"2-digit",
minute:"2-digit",
second:"2-digit",
day:"2-digit",
month:"short",
year:"numeric"
})+" IST";

},1000);

</script>

</body>
</html>
