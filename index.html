<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Launcher</title>
  <style>
    body{font-family:system-ui,Arial;background:#0f0f0f;color:#fff;margin:24px}
    h1{margin:0 0 12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    button{height:56px;border:0;border-radius:14px;background:#2b2b2b;color:#fff;
      font-size:16px;cursor:pointer}
    button:hover{background:#3a3a3a}
    .note{opacity:.7;margin-top:12px;font-size:13px}
  </style>
</head>
<body>
  <h1>My Dashboard</h1>

  <div class="grid">
    <!-- Deep links (open app if installed) -->
    <button onclick="go('discord://','https://discord.com/app')">Discord</button>
    <button onclick="go('spotify:','https://open.spotify.com')">Spotify</button>
    <button onclick="go('whatsapp://','https://web.whatsapp.com')">WhatsApp</button>
    <button onclick="go('steam://','https://store.steampowered.com')">Steam</button>

    <!-- Normal links -->
    <button onclick="openWeb('https://gmail.com')">Gmail</button>
    <button onclick="openWeb('https://youtube.com')">YouTube</button>
  </div>

  <div class="note">
    Tip: If an app deep link is blocked or the app isn’t installed, it will open the web fallback.
  </div>

  <script>
    function openWeb(url){
      window.open(url, "_blank");
    }

    // tries to open app deep link, then falls back to web
    function go(appLink, webFallback){
      // Try app
      window.location.href = appLink;

      // After a short moment, open fallback
      setTimeout(() => {
        window.open(webFallback, "_blank");
      }, 700);
    }
  </script>
</body>
</html>
